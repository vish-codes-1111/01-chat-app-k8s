name: Chat App CI                  # Name shown in GitHub Actions tab

on:
  push:
    branches: [main]               # Trigger ONLY on push to main branch

jobs:

  # ─── JOB 1: Build & Push Backend ───────────────────────────────
  build-backend:
    runs-on: ubuntu-latest         # Fresh Ubuntu VM for this job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Downloads your repo onto the runner

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}   # Reads from your secrets
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend        # Where your backend Dockerfile is
          push: true                # Actually push to DockerHub
          tags: vishnu1111/chatapp-backend:latest

  # ─── JOB 2: Build & Push Frontend ──────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest         # Separate fresh VM for this job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend       # Where your frontend Dockerfile is
          push: true
          tags: vishnu1111/chatapp-frontend:latest
