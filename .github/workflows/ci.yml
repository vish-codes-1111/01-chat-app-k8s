name: Chat App CI

on:
  push:
    branches: [main]

jobs:

  # ─── JOB 1: Run Tests
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend   

      - name: Run backend tests
        run: npm test
        working-directory: ./backend

  # ─── JOB 2: Build & Push Backend ───────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: test                        # ← waits for 'test' job to pass first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            vishnu1111/chatapp-backend:latest
            vishnu1111/chatapp-backend:${{ github.sha }}

  # ─── JOB 3: Build & Push Frontend ──────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: test                        # ← also waits for 'test' job to pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            vishnu1111/chatapp-frontend:latest
            vishnu1111/chatapp-frontend:${{ github.sha }}
