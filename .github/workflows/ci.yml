name: Chat App CI

env:
  DOCKERHUB_USER: vishnu1111
  NODE_VERSION: '24'
  
on:
  push:
    branches: [main]

 # ─── JOB 1: Run Tests
jobs: 
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22,23]
        
    runs-on: ${{matrix.os}}
    
    name: Test on Node ${{ matrix.node-version }} 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend   

      - name: Run backend tests
        run: npm test
        working-directory: ./backend

  # ─── JOB 2: Build & Push Backend ───────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: test                   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/chatapp-backend:latest
            ${{ env.DOCKERHUB_USER }}/chatapp-backend:${{ github.sha }}

  # ─── JOB 3: Build & Push Frontend ──────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: test                     

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/chatapp-frontend:latest
            ${{ env.DOCKERHUB_USER }}/chatapp-frontend:${{ github.sha }}
