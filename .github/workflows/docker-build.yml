name: Docker Build and Push

on:
  workflow_call:
    inputs:                          # inputs = parameters 
      service-name:
        required: true
        type: string                 # "backend" or "frontend"
      docker-image:
        required: true
        type: string                 # e.g."username/chatapp-backend"
      build-context:
        required: true
        type: string                 # e.g. "./backend"
    secrets:                       
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push ${{ inputs.service-name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build-context }}    
          push: true
          tags: |
            ${{ inputs.docker-image }}:latest
            ${{ inputs.docker-image }}:${{ github.sha }}
